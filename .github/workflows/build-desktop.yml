name: Build and release desktop artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional existing release tag to publish, for example v0.0.13"
        required: false
        type: string
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            script: build:linux
            artifact_name: fix-my-text-linux
            artifact_path: |
              dist/*.AppImage
              dist/*.deb
          - platform: mac
            os: macos-latest
            script: build:mac
            artifact_name: fix-my-text-mac
            artifact_path: |
              dist/*.dmg
              dist/*.zip
          - platform: windows
            os: windows-latest
            script: build:win
            artifact_name: fix-my-text-windows
            artifact_path: |
              dist/*.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set package version from release tag
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != ''
        shell: bash
        run: npm version "${RELEASE_TAG#v}" --no-git-tag-version --allow-same-version

      - name: Build ${{ matrix.platform }} package
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload ${{ matrix.platform }} artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && inputs.release_tag == '' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 3

      - name: Publish ${{ matrix.platform }} release assets
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -z "$RELEASE_TAG" || "$RELEASE_TAG" != v* ]]; then
            echo "::error::Release tag must start with v."
            exit 1
          fi

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --target "$GITHUB_SHA" --title "$RELEASE_TAG" --generate-notes \
              || gh release view "$RELEASE_TAG" >/dev/null
          fi

          files=()
          while IFS= read -r pattern; do
            [[ -z "$pattern" ]] && continue
            for file in $pattern; do
              [[ -e "$file" ]] && files+=("$file")
            done
          done <<'ASSET_PATTERNS'
          ${{ matrix.artifact_path }}
          ASSET_PATTERNS

          if (( ${#files[@]} == 0 )); then
            echo "::error::No release assets found."
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
